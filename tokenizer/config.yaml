num_latent_tokens: 256
variable_length: True
variable_method: ours2
merge_dim: 768
vf_loss_weight: 0.25
vf_margin: 0.25

results_dir: outputs
cloud_save_path: outputs
compile: False # Not available
global_seed: 42
log_every: 50
vis_every: 5000
ckpt_every: 10000
mixed_precision: bf16
no_local_save: True

dataset: imagenet
data_path: /root/ImageNet/train
image_size: 256

vq_model: SoftVQ-2
tau: 0.07
ema: True 
num_codebooks: 4
codebook_size: 8192
codebook_embed_dim: 32
entropy_loss_ratio: 0.01
vq_loss_ratio: 0.0 
commit_loss_beta: 0.0

reconstruction_weight: 1.0
perceptual_weight: 1.0
perceptual_warmup: 10000
disc_weight: 0.4
disc_adaptive_weight: True
use_diff_aug: False 
disc_cr_loss_weight: 4.0
disc_start: 20000
disc_type: dino
disc_loss: hinge
gen_loss: hinge
lecam_loss_weight: 0.001

enc_type: vit
encoder_model: vit_base_patch14_dinov2.lvd142m
encoder_pretrained: True
encoder_patch_size: 16
encoder_tuning_method: full
dec_type: vit
decoder_model: vit_base_patch14_dinov2.lvd142m
decoder_pretrained: False 
decoder_patch_size: 16
decoder_tuning_method: full

# repa
repa: True
repa_model: vit_large_patch14_dinov2.lvd142m
repa_patch_size: 16
repa_proj_dim: 1024  # 768
# repa_loss_weight: 0.1
# repa_align: global
aux_decoder_model: vit_tinytiny_patch14_dinov2


epochs: 12
lr: 1.0e-4
optim: adamw
lr_scheduler: cosine
weight_decay: 0.0001
beta1: 0.9
beta2: 0.95
max_grad_norm: 1.0
global_batch_size: 64
lr_warmup_epochs: 0.25

# # global_batch_size: 256
# global_batch_size: 128
# lr_warmup_epochs: 0.5
